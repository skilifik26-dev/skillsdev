<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style2.css') }}">
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Create Account</h2>

            <form action="/register" method="POST">
                <div>
                    <label>First Name(s)</label>
                    {%if firstName%}
                        <input type="text" name="firstName" value={{firstname}} required>
                    {%else%}    
                        <input type="text" name="firstName" required>
                    {%endif%}                    
                </div>

                <div>
                    <label>Surname</label>
                    {%if surname%}
                        <input type="text" name="surname" value="{{surname}}" required>
                    {%else%}    
                        <input type="text" name="surname" required>
                    {%endif%}  
                </div>

                <div>
                    <label>Email</label>
                    {%if email%}
                        <input type="email" name="email" value="{{email}}" required>
                    {%else%}    
                        <input type="email" name="email" required>
                    {%endif%} 
                </div>

                <div class="radio_container">
                    <label>Learner</label><input class="radio_input" type="radio" name="role" value="Learner" required />
                    <label>Employer</label><input class="radio_input" type="radio" name="role" value="Employer" required />
                </div>

                <div>
                    <label>Password</label>
                    <input type="password" name="password" required>
                </div>

                <div>
                    <label>Confirm Password</label>
                    <input type="password" name="confirm_password" required>
                </div>
                {%if message%}
                    <p class="match_pwd_errorMsg">{{message}}</p>
                {%endif%}

                <p>By signing up for Codecademy, you agree to Skillifik's <a class="register_a" href="">Terms of Service</a> & 
                    <a class="register_a" href="">Privacy Policy</a>.</p>
                <button type="submit" class="btn">Register</button>
                <p>Already have an account? <a class="register_a" href="{{ url_for('login')}}">login</a></p> 
            </form>
        </div>
    </div>
    
</body>
</html>
