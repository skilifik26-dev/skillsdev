<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkillsDev</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav>
    <a href="{{ url_for('dashboard') }}">
        <img src="{{ url_for('static', filename='pictures/skillifik1.png') }}"
             alt="SkillsDev" style="height:40px;">
    </a>
    <div>
        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('courses') }}">Courses</a>
        <a href="{{ url_for('profile') }}">My Profile</a>
        <a href="{{ url_for('talent') }}">Talent Hub</a>
        <a href="{{ url_for('logout') }}"
           style="color:rgba(255,255,255,0.4)">Logout</a>
    </div>
</nav>

<div class="page">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    {% for category, message in messages %}
    <p style="padding:12px;border-radius:6px;margin-bottom:14px;font-size:14px;
              background:{% if category == 'error' %}#f8d7da{% else %}#d4edda{% endif %};
              color:{% if category == 'error' %}#721c24{% else %}#155724{% endif %};">
        {{ message }}
    </p>
    {% endfor %}
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}

</div>

</body>

<footer>
    <a href="">About</a>
    <a href="">Courses</a>
    <a href="">Contacts</a>
    <a href="">Career Paths</a>
</footer>
</html>
