<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style2.css') }}">
</head>
<body>

{% for message in get_flashed_messages() %}
    <p style="padding:12px;background:#d4edda;color:#155724;border-radius:6px;margin:10px">
        {{ message }}
    </p>
{% endfor %}
<div class="container">
    <div class="card">
        <h2>Login</h2>

        <form action="/login" method="POST">
            <input type="text" name="username"
                   placeholder="Username" required>
            <input type="password" name="password"
                   placeholder="Password" required>
            <button class="btn" type="submit">Login</button>
        </form>

        <p>Don't have an account? <a class="register_a" href="{{ url_for('register')}}">Register</a></p>

        <p>Don't have an account?
            <a href="{{ url_for('register') }}">Register</a>
        </p>

    </div>
</div>

</body>
</html>
