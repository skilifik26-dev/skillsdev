<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — SkillsDev</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Logo bar matching the rest of the app -->
<nav class="login_and_reg_nav">
    <a href="{{ url_for('login') }}">
        <img src="{{ url_for('static', filename='pictures/skillifik1.png') }}"
             alt="SkillsDev" style="height:40px;">
    </a>
</nav>

<div class="auth-page">

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
        {% for category, message in messages %}
        <p style="padding:12px;border-radius:6px;margin-bottom:14px;font-size:14px;
                  background:{% if category == 'error' %}#f8d7da{% else %}#d4edda{% endif %};
                  color:{% if category == 'error' %}#721c24{% else %}#155724{% endif %};">
            {{ message }}
        </p>
        {% endfor %}
    {% endif %}
    {% endwith %}

    <h1>Welcome back</h1>
    <p>Sign in to continue.</p>

    <form action="/login" method="POST">
        <label>Username</label>
        <input type="text" name="username" required autofocus>

        <label>Password</label>
        <input type="password" name="password" required>

        <button class="full" type="submit">Login</button>
    </form>

    <p class="auth-link">
        Don't have an account? <a href="{{ url_for('register') }}">Register</a>
    </p>

</div>

</body>
</html>
